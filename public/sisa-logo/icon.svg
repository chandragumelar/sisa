    <line x1="512" y1="512" x2="858.4082877265173" y2="638.0823056355746" stroke="#1A1815" stroke-width="12.288" stroke-linecap="round"/>
    <!-- center dot — represents "what's left" / decision point -->
    <circle cx="512" cy="512" r="35.84" fill="#1A1815"/>
  </g>
